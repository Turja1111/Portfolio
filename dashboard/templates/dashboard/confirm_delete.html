{% extends 'dashboard/base.html' %} {% block title %}Delete {{ type }}{%
endblock %} {% block page_title %}Delete {{ type }}{% endblock %} {% block
content %}
<div class="max-w-md">
  <div class="card border-red-500/30 bg-red-950/10">
    <div class="text-center">
      <div
        class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center text-red-400 text-2xl mx-auto mb-5"
      >
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <h2 class="text-xl font-bold text-white mb-2">Delete {{ type }}</h2>
      <p class="text-slate-400 mb-2">Are you sure you want to delete:</p>
      <p class="font-semibold text-red-300 mb-6">{{ object }}</p>
      <p class="text-slate-500 text-sm mb-8">This action cannot be undone.</p>
      <form method="POST" class="flex gap-3 justify-center">
        {% csrf_token %}
        <button type="submit" class="btn-danger">
          <i class="fa-solid fa-trash mr-2"></i>Yes, Delete
        </button>
        <a href="javascript:history.back()" class="btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
