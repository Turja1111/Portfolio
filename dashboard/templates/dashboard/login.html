<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-slate-900 flex items-center justify-center px-4"
    style="
      background-image: radial-gradient(
        rgba(99, 102, 241, 0.12) 1px,
        transparent 1px
      );
      background-size: 32px 32px;
    "
  >
    <div
      class="absolute top-0 left-0 w-96 h-96 bg-indigo-600/20 rounded-full filter blur-3xl -translate-x-1/2 -translate-y-1/2"
    ></div>
    <div
      class="absolute bottom-0 right-0 w-96 h-96 bg-purple-600/20 rounded-full filter blur-3xl translate-x-1/2 translate-y-1/2"
    ></div>

    <div class="relative w-full max-w-md">
      <!-- Card -->
      <div
        class="bg-slate-800/80 border border-slate-700/60 rounded-3xl p-10 backdrop-blur-xl shadow-2xl"
      >
        <!-- Logo -->
        <div class="text-center mb-8">
          <div
            class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center text-white font-black text-xl mx-auto mb-4"
          >
            TD
          </div>
          <h1 class="text-2xl font-black text-white">Dashboard Login</h1>
          <p class="text-slate-400 text-sm mt-1">
            Sign in to manage your portfolio
          </p>
        </div>

        {% if messages %} {% for message in messages %}
        <div
          class="mb-5 px-4 py-3 rounded-xl bg-red-500/15 border border-red-500/30 text-red-300 text-sm flex items-center gap-2"
        >
          <i class="fa-solid fa-circle-exclamation"></i>{{ message }}
        </div>
        {% endfor %} {% endif %}

        <form method="POST" class="space-y-5">
          {% csrf_token %}
          <div>
            <label
              class="text-xs text-slate-400 uppercase tracking-wide mb-2 block"
              >Username</label
            >
            {{ form.username }}
          </div>
          <div>
            <label
              class="text-xs text-slate-400 uppercase tracking-wide mb-2 block"
              >Password</label
            >
            {{ form.password }}
          </div>
          <button
            type="submit"
            class="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold rounded-xl transition-all hover:shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-0.5 mt-2"
          >
            <i class="fa-solid fa-right-to-bracket mr-2"></i>Sign In
          </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-700/60 text-center">
          <a
            href="/"
            class="text-slate-500 text-sm hover:text-slate-300 transition"
          >
            <i class="fa-solid fa-arrow-left mr-1"></i>Back to Portfolio
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
