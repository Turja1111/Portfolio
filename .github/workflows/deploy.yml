name: Deploy Portfolio

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/portfolio

jobs:
  # ── 1. Lint & Check ─────────────────────────────────────────────
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=migrations,__pycache__

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: portfolio.settings.development
          SECRET_KEY: ci-test-key-not-for-production
          DATABASE_URL: sqlite:////tmp/ci.db
        run: python manage.py check

  # ── 2. Build & Push Docker Image ────────────────────────────────
  build-and-push:
    needs: lint-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── 3. Deploy to VPS ────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/portfolio
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker compose -f docker-compose.prod.yml up -d --no-deps web
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml restart nginx
            docker image prune -f
            echo "✅ Deployment complete at $(date)"
