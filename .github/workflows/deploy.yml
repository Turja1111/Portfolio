name: CI — Lint & Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=migrations,__pycache__

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: portfolio.settings.development
          SECRET_KEY: ci-test-key-not-for-production
          DATABASE_URL: sqlite:////tmp/ci.db
        run: python manage.py check
